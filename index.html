<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planificador de Turnos</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <!-- FullCalendar CSS -->
    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@5.10.1/main.min.css" rel="stylesheet">
    <!-- Google Fonts: Roboto -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <!-- Estilos personalizados -->
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            transition: background-color 0.3s, color 0.3s;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        #calendar {
            margin-bottom: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }
        .btn {
            border-radius: 8px;
            padding: 10px 20px;
            font-weight: 500;
            transition: all 0.3s ease;
        }
        .btn-primary {
            background-color: #007bff;
            border-color: #007bff;
        }
        .btn-success {
            background-color: #28a745;
            border-color: #28a745;
        }
        /* Modo claro */
        body.light {
            background-color: #f8f9fa;
            color: #212529;
        }
        body.light #calendar {
            background-color: #fff;
        }
        /* Modo oscuro */
        body.dark {
            background-color: #121212;
            color: #e0e0e0;
        }
        body.dark #calendar {
            background-color: #1e1e1e;
        }
        body.dark .btn-primary {
            background-color: #0d6efd;
            border-color: #0d6efd;
        }
        body.dark .btn-success {
            background-color: #198754;
            border-color: #198754;
        }
        /* Spinner */
        .loader {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border: 8px solid #f3f3f3;
            border-top: 8px solid #3498db;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            animation: spin 1s linear infinite;
            z-index: 1000;
        }
        @keyframes spin {
            0% { transform: translate(-50%, -50%) rotate(0deg); }
            100% { transform: translate(-50%, -50%) rotate(360deg); }
        }
        @media (max-width: 768px) {
            #calendar {
                font-size: 12px;
            }
            .btn {
                padding: 8px 16px;
            }
        }
    </style>
</head>
<body class="light">
    <div class="loader" id="loader"></div>
    <div class="container">
        <h1 class="text-center mb-4">Planificador de Turnos</h1>
        <div class="text-center mb-4">
            <button id="toggleTheme" class="btn btn-secondary"><i class="bi bi-moon"></i> Modo oscuro</button>
            <button id="downloadPdfBtn" class="btn btn-success ms-2"><i class="bi bi-file-earmark-pdf"></i> Descargar PDF</button>
        </div>
        <p class="text-center">Selecciona los días festivos en el calendario (se marcarán en rojo). Los turnos se actualizarán automáticamente.</p>
        <div id="calendar"></div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@5.10.1/main.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const { jsPDF } = window.jspdf;
            const people = ["Sonia", "Bárbara", "Loli", "Ángela", "David", "Juani", "Luis"];
            const activities = ["LIBRO", "RAU", "PRIMEROS", "SEGUNDOS", "GIN", "ORL", "PASILLOS"];
            let holidays = new Set();
            const loader = document.getElementById('loader');

            const calendarEl = document.getElementById('calendar');
            const calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'dayGridMonth',
                initialDate: '2025-04-01',
                selectable: true,
                dateClick: function(info) {
                    let dateStr = info.dateStr;
                    if (holidays.has(dateStr)) {
                        holidays.delete(dateStr);
                        let event = calendar.getEventById(dateStr);
                        if (event) event.remove();
                    } else {
                        holidays.add(dateStr);
                        calendar.addEvent({
                            id: dateStr,
                            start: dateStr,
                            display: 'background',
                            color: 'red'
                        });
                    }
                    generateSchedule();
                },
                headerToolbar: {
                    left: 'prev,next today',
                    center: 'title',
                    right: 'dayGridMonth'
                },
                views: {
                    dayGridMonth: {
                        titleFormat: { year: 'numeric', month: 'long' }
                    }
                },
                eventDidMount: function(info) {
                    if (info.event.extendedProps.person) {
                        info.el.style.backgroundColor = '#007bff';
                        info.el.style.color = '#fff';
                    }
                }
            });
            calendar.render();

            function isWorkingDay(date) {
                let day = date.getDay();
                let dateStr = date.toISOString().split('T')[0];
                return day !== 0 && day !== 6 && !holidays.has(dateStr);
            }

            function getAssignments(k) {
                let assignments = {};
                for (let i = 0; i < 7; i++) {
                    let activityIndex = (i + k) % 7;
                    assignments[people[i]] = activities[activityIndex];
                }
                return assignments;
            }

            function generateSchedule() {
                loader.style.display = 'block'; // Mostrar loader
                setTimeout(() => {
                    let currentDate = new Date(2025, 3, 1); // 1 de abril de 2025
                    let endDate = new Date(2025, 3, 30); // Último día del mes
                    let workingDayIndex = 0;

                    // Eliminar eventos de turnos previos
                    calendar.getEvents().forEach(event => {
                        if (event.extendedProps.person) {
                            event.remove();
                        }
                    });

                    while (currentDate <= endDate) {
                        if (isWorkingDay(currentDate)) {
                            let dateStr = currentDate.toISOString().split('T')[0];
                            let k = workingDayIndex % 7;
                            let assignments = getAssignments(k);

                            // Añadir eventos al calendario
                            people.forEach(person => {
                                calendar.addEvent({
                                    title: `${person}: ${assignments[person]}`,
                                    start: dateStr,
                                    allDay: true,
                                    extendedProps: { person: person }
                                });
                            });

                            workingDayIndex++;
                        }
                        currentDate.setDate(currentDate.getDate() + 1);
                    }
                    loader.style.display = 'none'; // Ocultar loader
                }, 500); // Simular procesamiento
            }

            // Generar el PDF
            document.getElementById('downloadPdfBtn').addEventListener('click', function() {
                loader.style.display = 'block'; // Mostrar loader
                html2canvas(calendarEl).then(canvas => {
                    const imgData = canvas.toDataURL('image/png');
                    const pdf = new jsPDF('p', 'mm', 'a4');
                    const imgWidth = 190;
                    const pageHeight = 297;
                    const imgHeight = (canvas.height * imgWidth) / canvas.width;
                    let heightLeft = imgHeight;
                    let position = 0;

                    pdf.addImage(imgData, 'PNG', 10, position, imgWidth, imgHeight);
                    heightLeft -= pageHeight;

                    while (heightLeft >= 0) {
                        position = heightLeft - imgHeight;
                        pdf.addPage();
                        pdf.addImage(imgData, 'PNG', 10, position, imgWidth, imgHeight);
                        heightLeft -= pageHeight;
                    }

                    pdf.save('turnos_calendario.pdf');
                    loader.style.display = 'none'; // Ocultar loader
                });
            });

            // Alternar tema claro/oscuro
            document.getElementById('toggleTheme').addEventListener('click', function() {
                if (document.body.classList.contains('light')) {
                    document.body.classList.remove('light');
                    document.body.classList.add('dark');
                    this.innerHTML = '<i class="bi bi-sun"></i> Modo claro';
                } else {
                    document.body.classList.remove('dark');
                    document.body.classList.add('light');
                    this.innerHTML = '<i class="bi bi-moon"></i> Modo oscuro';
                }
            });

            // Generar turnos iniciales
            generateSchedule();
        });
    </script>
</body>
</html>
